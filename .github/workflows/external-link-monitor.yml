name: external-link-monitor

on:
  schedule:
    - cron: "20 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_PUBLIC_DOCS_URL: https://bryce.seefieldt.ca/docs
  NEXT_PUBLIC_GITHUB_URL: https://github.com/bryce-seefieldt/portfolio-app
  NEXT_PUBLIC_GITHUB_DOCS_REPO_URL: https://github.com/bryce-seefieldt/portfolio-docs
  NEXT_PUBLIC_SITE_URL: https://bryce.seefieldt.ca

jobs:
  check-external-evidence-links:
    name: check-external-evidence-links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: "10.0.0"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: Check external evidence links (live)
        run: pnpm links:check:external
